[theme]
base                     = "dark"
primaryColor             = "#29B6F6"
backgroundColor          = "#0E1117"
secondaryBackgroundColor = "#1A1F2E"
textColor                = "#E8EAF0"
font                     = "sans serif"

[server]
headless           = true
enableCORS         = false
enableXsrfProtection = false   # needed when Flask and Streamlit share the same origin

[browser]
gatherUsageStats   = false

[client]
toolbarMode        = "minimal"   # hides the top toolbar to save vertical space
showSidebarNavigation = false
